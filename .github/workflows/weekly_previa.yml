name: PRODE - Reporte Semanal de Previa

on:
  schedule:
    # Lunes 12:00 PM Argentina (ART = UTC-3, entonces 15:00 UTC)
    - cron: '0 15 * * 1'
  workflow_dispatch:

jobs:
  enviar-reporte-previa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Enviar reporte semanal de previa
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python notifications_previa.py
